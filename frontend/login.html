<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – Edu2Job</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="margin: 0;">
  <!-- Pure CSS Background Animation -->
  <div class="animated-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="glass-auth-page">
    <div class="glass-auth-card">
      <div class="glass-form-section">
        <h2 class="glass-auth-title">Welcome Back</h2>
        <p class="glass-auth-subtitle">Sign in to your account to continue</p>
        
        <form id="loginForm" novalidate>
          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">mail</span>
              <input type="email" id="email" class="glass-input" placeholder="Email Address" required />
            </div>
          </div>

          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">lock</span>
              <input type="password" id="password" class="glass-input" placeholder="Password" required />
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px;">
            <label style="display:flex; align-items:center; gap:8px; font-size:0.9rem; color:var(--text-600); cursor:pointer;">
              <input type="checkbox" id="remember-me" style="accent-color:var(--primary);" /> Remember me
            </label>
            <a href="#" style="color:var(--primary); font-size:0.9rem; text-decoration:none; font-weight:500;">Forgot password?</a>
          </div>

          <button type="submit" class="glass-btn">Sign In</button>
        </form>

        <div class="glass-link">
          Don't have an account? <a href="signup.html">Create an account</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }
      try {
        const res = await apiPost('/auth/login', { email, password });
        if (res.token) {
          localStorage.setItem('edu2job_token', res.token);
          localStorage.setItem('edu2job_user', JSON.stringify(res.user));

          // Fetch full profile from the server (includes resume, skills, etc.)
          try {
            const profile = await apiGet('/profile/me');
            if (profile && profile.user) {
              localStorage.setItem('edu2job_user', JSON.stringify(profile.user));
            }
          } catch (err) {
            console.warn('Could not fetch full profile:', err);
          }

          // Fetch saved predictions from the server
          try {
            const predRes = await apiGet('/profile/predictions');
            if (predRes && predRes.predictions) {
              localStorage.setItem('edu2job_predictions', JSON.stringify(predRes.predictions));
            }
          } catch (err) {
            console.warn('Could not fetch predictions:', err);
          }

          showToast('Login successful!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          showToast(res.error || 'Login failed', 'error');
        }
      } catch (err) { showToast(err.message || 'Network error', 'error'); }
    });
  </script>
</body>
</html>
