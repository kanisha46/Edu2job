<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Edu2Job</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="margin: 0;">
  <!-- Pure CSS Background Animation -->
  <div class="animated-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="glass-auth-page">
    <div class="glass-auth-card">
      <div class="glass-form-section">
        <h2 class="glass-auth-title">Create Account</h2>
        <p class="glass-auth-subtitle">Join Edu2Job and discover your path</p>
        
        <form id="signupForm" novalidate>
          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">person</span>
              <input type="text" id="fullName" class="glass-input" placeholder="Full Name" required />
            </div>
          </div>

          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">mail</span>
              <input type="email" id="email" class="glass-input" placeholder="Email Address" required />
            </div>
          </div>

          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">lock</span>
              <input type="password" id="password" class="glass-input" placeholder="Password" required minlength="6" />
            </div>
          </div>

          <div class="glass-form-group">
            <div class="glass-input-icon">
              <span class="material-symbols-outlined">lock_reset</span>
              <input type="password" id="confirmPassword" class="glass-input" placeholder="Confirm Password" required />
            </div>
          </div>

          <button type="submit" class="glass-btn" style="margin-top: 24px;">Sign Up</button>
        </form>

        <div class="glass-link">
          Already have an account? <a href="login.html">Log in instead</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
      const data = {
        full_name: document.getElementById('fullName').value.trim(),
        email:     document.getElementById('email').value.trim(),
        password:  password,
      };
      if (!data.full_name || !data.email || !data.password) {
        showToast('All fields are required', 'error'); return;
      }
      if (data.password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      try {
        const res = await apiPost('/auth/signup', data);
        if (res.user_id) {
          showToast('Account created! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'login.html', 1000);
        } else {
          showToast(res.error || 'Signup failed', 'error');
        }
      } catch (err) { showToast(err.message || 'Network error', 'error'); }
    });
  </script>
</body>
</html>
