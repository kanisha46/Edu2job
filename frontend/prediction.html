<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Prediction – Edu2Job</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar light" id="sidebar"></aside>

    <div class="main-content">
      <header class="main-header">
        <h2>Career Prediction</h2>
      </header>

      <div class="page-content" style="max-width:900px;">
        <!-- Prediction Parameters -->
        <div class="pred-form-card">
          <h3>Prediction Parameters</h3>
          <form id="predForm" novalidate>
            <div class="form-grid-2" style="margin-bottom:20px;">
              <div class="form-group" style="margin-bottom:0;">
                <label for="degree" style="font-size:0.875rem; font-weight:500; color:var(--text-600);">Degree Program</label>
                <select id="degree">
                  <option value="B.Tech">B.Tech</option>
                  <option value="M.Tech">M.Tech</option>
                  <option value="B.Sc">B.Sc</option>
                  <option value="M.Sc">M.Sc</option>
                  <option value="BCA">BCA</option>
                  <option value="MCA">MCA</option>
                  <option value="B.E">B.E</option>
                  <option value="MBA">MBA</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label for="branch" style="font-size:0.875rem; font-weight:500; color:var(--text-600);">Branch</label>
                <select id="branch">
                  <option value="">Select Branch</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="IT">Information Technology</option>
                  <option value="ECE">Electronics & Communication</option>
                  <option value="EE">Electrical Engineering</option>
                  <option value="ME">Mechanical Engineering</option>
                  <option value="Civil">Civil Engineering</option>
                  <option value="AI/ML">AI / ML</option>
                  <option value="Data Science">Data Science</option>
                  <option value="Software Engineering">Software Engineering</option>
                  <option value="BBA">BBA</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-grid-2" style="margin-bottom:20px;">
              <div class="form-group" style="margin-bottom:0;">
                <label for="gpa" style="font-size:0.875rem; font-weight:500; color:var(--text-600);">Current GPA</label>
                <input type="number" id="gpa" placeholder="e.g. 3.8" step="0.1" value="3.8" />
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label for="specialization" style="font-size:0.875rem; font-weight:500; color:var(--text-600);">Specialization <span style="font-weight:400;color:var(--text-400);">(optional)</span></label>
                <input type="text" id="specialization" placeholder="e.g. Cloud Computing" />
              </div>
            </div>
            <div class="form-group">
              <label for="skills" style="font-size:0.875rem; font-weight:500; color:var(--text-600);">Key Skills</label>
              <input type="text" id="skills" placeholder="Python, React, SQL..." value="Python, React, SQL" />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Predict Top Roles</button>
          </form>
        </div>

        <!-- Results -->
        <div id="resultsSection" class="hidden">
          <h4 style="font-size:1.125rem; font-weight:700; color:var(--text-800); margin-bottom:16px;">Results</h4>
          <div id="resultsList"></div>

          <div id="explanationCard" class="explanation-card hidden" style="margin-top:24px;">
            <h3><span class="material-symbols-outlined" style="color:var(--primary);">lightbulb</span> AI Explanation</h3>
            <ul class="explanation-list" id="explanationList"></ul>
          </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="hidden" style="text-align:center; padding:40px;">
          <div class="spinner"></div>
          <p style="color:var(--text-500); margin-top:12px;">Analyzing your profile...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    requireAuth();
    renderSidebar('prediction', 'light');

    const user = getUser();
    if (user) {
      if (user.degree) {
        const degreeSelect = document.getElementById('degree');
        if (Array.from(degreeSelect.options).some(opt => opt.value === user.degree)) {
            degreeSelect.value = user.degree;
        }
      }
      if (user.branch) {
        const branchSelect = document.getElementById('branch');
        if (Array.from(branchSelect.options).some(opt => opt.value === user.branch)) {
            branchSelect.value = user.branch;
        }
      }
      if (user.specialization) document.getElementById('specialization').value = user.specialization;
      if (user.gpa > 0) document.getElementById('gpa').value = user.gpa;
      if (user.skills) document.getElementById('skills').value = user.skills;
    }

    const roleIcons = {
      'Software Engineer': 'developer_mode',
      'Data Analyst': 'monitoring',
      'Frontend Developer': 'web',
      'Data Scientist': 'psychology',
      'ML Engineer': 'smart_toy',
      'Database Admin': 'storage',
      'DevOps Engineer': 'cloud',
      'Systems Analyst': 'analytics',
      'Backend Developer': 'dns',
      'Full Stack Developer': 'stacks',
      'Cloud Architect': 'cloud_circle',
    };
    const roleCats = {
      'Software Engineer': 'Tech',
      'Data Analyst': 'Data',
      'Frontend Developer': 'Web',
      'Data Scientist': 'AI / ML',
      'ML Engineer': 'AI / ML',
      'Database Admin': 'Data',
      'DevOps Engineer': 'Cloud',
      'Systems Analyst': 'Tech',
      'Backend Developer': 'Tech',
      'Full Stack Developer': 'Web',
      'Cloud Architect': 'Cloud',
    };

    document.getElementById('predForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        degree: document.getElementById('degree').value,
        branch: document.getElementById('branch').value,
        specialization: document.getElementById('specialization').value.trim(),
        skills: document.getElementById('skills').value.trim(),
        gpa: parseFloat(document.getElementById('gpa').value) || 0,
        experience: 1,
        certifications: '',
      };
      if (!data.skills) { showToast('Please enter your skills', 'error'); return; }

      document.getElementById('resultsSection').classList.add('hidden');
      document.getElementById('loadingState').classList.remove('hidden');

      try {
        const res = await apiPost('/prediction/predict', data);
        document.getElementById('loadingState').classList.add('hidden');

        if (res.predictions) {
          document.getElementById('resultsSection').classList.remove('hidden');
          let html = '';
          res.predictions.forEach((p, i) => {
            const icon = roleIcons[p.role] || 'work';
            const cat = roleCats[p.role] || 'General';
            const pct = Math.round(p.confidence);

            // Build score breakdown tooltip text
            let breakdown = '';
            if (p.education_score !== undefined) {
              breakdown = `Education: ${Math.round(p.education_score)}% · Skills: ${Math.round(p.skills_score)}% · Resume: ${Math.round(p.resume_score)}% · Certs: ${Math.round(p.certifications_score)}%`;
            }

            html += `<div class="result-card"><div class="result-card-inner">
              <div class="result-role-info">
                <div class="result-role-icon"><span class="material-symbols-outlined">${icon}</span></div>
                <div><div class="result-role-name">${p.role}</div><div class="result-role-cat">${cat}</div></div>
              </div>
              <div class="result-bar-container">
                <div class="result-bar"><div class="result-bar-fill" style="width:0%;" data-width="${pct}%"></div></div>
                <span class="result-percent">${pct}%</span>
              </div>
            </div>`;

            // Score breakdown row
            if (breakdown) {
              html += `<div style="padding:4px 16px 12px; font-size:0.75rem; color:var(--text-400);">${breakdown}</div>`;
            }

            // Per-role explanations
            if (p.explanations && p.explanations.length > 0) {
              html += `<div style="padding:0 16px 12px;">`;
              p.explanations.forEach(exp => {
                html += `<div style="font-size:0.8rem; color:var(--text-500); padding:2px 0;">• ${exp}</div>`;
              });
              html += `</div>`;
            }

            html += `</div>`;
          });
          document.getElementById('resultsList').innerHTML = html;

          // Animate bars
          setTimeout(() => {
            document.querySelectorAll('.result-bar-fill').forEach(bar => {
              bar.style.width = bar.dataset.width;
            });
          }, 100);

          // Save prediction to localStorage and server
          const topPred = res.predictions[0];
          const predEntry = { role: topPred.role, confidence: Math.round(topPred.confidence), date: new Date().toLocaleDateString() };
          const saved = JSON.parse(localStorage.getItem('edu2job_predictions') || '[]');
          saved.push(predEntry);
          localStorage.setItem('edu2job_predictions', JSON.stringify(saved));

          // Persist to MongoDB
          try { await apiPost('/profile/predictions', predEntry); } catch (e) { console.warn('Could not save prediction to server:', e); }

          // Global explanation
          if (res.explanation && res.explanation.length > 0) {
            document.getElementById('explanationCard').classList.remove('hidden');
            const expList = document.getElementById('explanationList');
            expList.innerHTML = '';
            res.explanation.forEach(exp => {
              expList.innerHTML += `<li>${exp}</li>`;
            });
          }
        } else {
          showToast(res.error || 'Prediction failed', 'error');
        }
      } catch (err) {
        document.getElementById('loadingState').classList.add('hidden');
        showToast(err.message || 'Network error', 'error');
      }
    });
  </script>
</body>
</html>
